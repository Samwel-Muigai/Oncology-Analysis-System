<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oncology Command | Backend Connected</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // API Configuration
        const API_URL = 'http://localhost:5000';
        
        // Axios instance with token
        const api = axios.create({
            baseURL: API_URL,
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        // Add token to requests
        api.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });
        
        // Global state
        let currentUser = null;
        
        // Initialize app after login
        async function initApp() {
            try {
                const response = await api.get('/auth/me');
                currentUser = response.data.user;
                document.getElementById('currentUserDisplay').innerText = currentUser.name;
                document.getElementById('welcomeUserName').innerText = currentUser.name;
                await loadAllData();
                showPage('home');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardApp').style.display = 'flex';
            } catch (error) {
                console.error('Auth failed:', error);
                localStorage.removeItem('token');
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('dashboardApp').style.display = 'none';
            }
        }
        
        // Load all data from backend
        async function loadAllData() {
            await Promise.all([
                loadPatients(),
                loadAppointments(),
                loadSchedules()
            ]);
        }
        
        // Load patients
        async function loadPatients() {
            try {
                const response = await api.get('/patients');
                window.globalPatients = response.data.patients;
                renderActivityTable();
                updatePatientCounter();
                updateInsightsCharts();
            } catch (error) {
                console.error('Error loading patients:', error);
            }
        }
        
        // Load appointments
        async function loadAppointments() {
            try {
                const response = await api.get('/appointments');
                window.appointments = response.data.appointments;
                renderCalendar();
                renderHomeAppointments();
                renderAppointments();
            } catch (error) {
                console.error('Error loading appointments:', error);
                window.appointments = [];
            }
        }
        
        // Load schedules
        async function loadSchedules() {
            try {
                const response = await api.get('/schedules');
                window.schedules = response.data.schedules;
                renderCalendar();
                renderHomeSchedules();
                renderSchedules();
            } catch (error) {
                console.error('Error loading schedules:', error);
                window.schedules = [];
            }
        }
        
        // Register patient
        async function registerPatient(name, age, diagnosis, priority, stay) {
            try {
                await api.post('/patients', { name, age, diagnosis, priority, stay });
                await loadPatients();
                alert(`Patient ${name} registered successfully`);
            } catch (error) {
                console.error('Error registering patient:', error);
                alert('Failed to register patient');
            }
        }
        
        // Delete patient
        async function deletePatient(id) {
            try {
                await api.delete(`/patients/${id}`);
                await loadPatients();
            } catch (error) {
                console.error('Error deleting patient:', error);
                alert('Failed to delete patient');
            }
        }
        
        // Add appointment
        async function addAppointment(patientName, date, time, reason) {
            try {
                await api.post('/appointments', { patientName, date, time, reason });
                await loadAppointments();
                alert(`Appointment for ${patientName} on ${date} scheduled`);
            } catch (error) {
                console.error('Error adding appointment:', error);
                alert('Failed to add appointment');
            }
        }
        
        // Delete appointment
        async function deleteAppointment(id) {
            try {
                await api.delete(`/appointments/${id}`);
                await loadAppointments();
            } catch (error) {
                console.error('Error deleting appointment:', error);
                alert('Failed to delete appointment');
            }
        }
        
        // Add schedule
        async function addSchedule(doctorName, date, shift, role) {
            try {
                await api.post('/schedules', { doctorName, date, shift, role });
                await loadSchedules();
                alert(`Schedule for ${doctorName} on ${date} added`);
            } catch (error) {
                console.error('Error adding schedule:', error);
                alert('Failed to add schedule');
            }
        }
        
        // Delete schedule
        async function deleteSchedule(id) {
            try {
                await api.delete(`/schedules/${id}`);
                await loadSchedules();
            } catch (error) {
                console.error('Error deleting schedule:', error);
                alert('Failed to delete schedule');
            }
        }
        
        // Login function
        async function login(email, password) {
            try {
                const response = await api.post('/auth/login', { email, password });
                localStorage.setItem('token', response.data.token);
                await initApp();
            } catch (error) {
                document.getElementById('loginErrorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('loginErrorMsg').style.display = 'none', 2000);
            }
        }
        
        // Register function
        async function register(name, email, password, confirm) {
            if (password !== confirm) {
                document.getElementById('signupErrorMsg').innerText = 'Passwords do not match';
                document.getElementById('signupErrorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('signupErrorMsg').style.display = 'none', 3000);
                return;
            }
            try {
                await api.post('/auth/register', { name, email, password });
                alert('Account created! Please login.');
                document.getElementById('showLoginTab').click();
            } catch (error) {
                document.getElementById('signupErrorMsg').innerText = error.response?.data?.error || 'Registration failed';
                document.getElementById('signupErrorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('signupErrorMsg').style.display = 'none', 3000);
            }
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('token');
            document.getElementById('dashboardApp').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            currentUser = null;
        }
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            initApp();
        } else {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardApp').style.display = 'none';
        }
    </script>
    <!-- Rest of the HTML (same as before but with backend integration) -->
</head>
<body>
    <!-- Same HTML structure as previous version -->
    <div class="login-container" id="loginContainer" style="display: none;">
        <!-- Login form HTML here -->
    </div>
    <div class="dashboard-wrapper" id="dashboardApp" style="display: none;">
        <!-- Dashboard HTML here -->
    </div>
</body>
</html>
